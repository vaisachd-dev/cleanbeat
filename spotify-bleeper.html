<!-- YOUR ORIGINAL UI REMAINS UNCHANGED -->

<script>

// ============================
// STATE
// ============================
let lyricsData = [];
let scheduledBleeps = [];
let firedBleeps = new Set();
let userVolume = 1;

// ============================
// BAD WORDS
// ============================
function getBadWords() {
  return [
    "fuck","shit","bitch","ass","damn"
  ];
}

// ============================
// NORMALIZATION
// ============================
function normalize(word) {
  return word.toLowerCase().replace(/[^a-z]/g, '');
}

// ============================
// BAD WORD CHECK
// ============================
function isBadWord(word) {
  const clean = normalize(word);
  const badWords = getBadWords();
  return badWords.some(w => clean === w);
}

// ============================
// LRC PARSER
// ============================
function parseLRC(lrc) {
  const lines = lrc.split('\n');
  const result = [];
  const regex = /\[(\d+):(\d+\.\d+)\]/;

  lines.forEach(line => {
    const match = line.match(regex);
    if (!match) return;

    const min = parseInt(match[1]);
    const sec = parseFloat(match[2]);
    const time = (min * 60 + sec) * 1000;

    const text = line.replace(regex, '').trim();
    if (text) result.push({ time, text });
  });

  return result.sort((a,b)=>a.time-b.time);
}

// ============================
// HARD CODED FALLBACK
// ============================
function getHardcodedLyrics(trackName) {
  const clean = trackName.toLowerCase().replace(/[^a-z0-9]/g, '');

  const library = {
    'aariaari': [
      { time: 0, text: "yo intro" },
      { time: 8000, text: "bitch you got an ego shouldn't fuck with me" },
      { time: 15000, text: "i make money like a casino" }
    ]
  };

  const key = Object.keys(library).find(k => clean.includes(k));
  return key ? library[key] : null;
}

// ============================
// WEB LYRICS HELPERS
// ============================
async function fetchJSON(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

async function fetchText(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.text();
  } catch {
    return null;
  }
}

// ============================
// GENIUS SCRAPER (via search + proxy)
// ============================
async function fetchFromGenius(trackName, artist) {
  try {
    const query = encodeURIComponent(`${trackName} ${artist}`);
    const searchUrl = `https://api.genius.com/search?q=${query}`;

    // Note: Genius API requires token in real usage.
    // We fallback to public HTML scraping via allorigins.

    const proxySearch = `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`;
    const data = await fetchJSON(proxySearch);

    if (!data) return null;

    const hits = data.response?.hits || [];
    if (!hits.length) return null;

    const songPath = hits[0].result.path;
    const songUrl = `https://genius.com${songPath}`;

    const proxiedPage = `https://api.allorigins.win/raw?url=${encodeURIComponent(songUrl)}`;
    const html = await fetchText(proxiedPage);

    if (!html) return null;

    // Extract lyrics from page
    const match = html.match(/<div data-lyrics-container="true">([\s\S]*?)<\/div>/gi);
    if (!match) return null;

    const lyrics = match.map(block =>
      block.replace(/<[^>]*>/g, '').trim()
    ).join('\n');

    return lyrics;

  } catch {
    return null;
  }
}

// ============================
// FETCH LYRICS (MULTI SOURCE)
// ============================
async function fetchLyrics(trackName, artist) {

  setStatus('Fetching lyrics...', 'multi-source');
  lyricsData = [];
  scheduledBleeps = [];
  firedBleeps.clear();

  // -------- LRCLIB (SYNCED) --------
  try {
    const url = `https://lrclib.net/api/search?q=${encodeURIComponent(trackName + ' ' + artist)}`;
    const res = await fetchJSON(url);

    if (res && res.length) {
      const match = res.find(r => r.syncedLyrics);

      if (match?.syncedLyrics) {
        setStatus('Synced lyrics loaded (LRCLIB)', 'lrclib');
        lyricsData = parseLRC(match.syncedLyrics);
        renderLyrics(lyricsData);
        scheduleBleeps();
        return;
      }
    }
  } catch {}

  // -------- GENIUS FALLBACK --------
  try {
    const geniusLyrics = await fetchFromGenius(trackName, artist);

    if (geniusLyrics) {
      setStatus('Lyrics loaded (Genius - unsynced)', 'genius');
      const lines = geniusLyrics.split('\n').filter(l => l.trim());

      // No sync → display only
      lyricsData = lines.map((t, i) => ({
        time: i * 2000,
        text: t
      }));

      renderLyrics(lyricsData);
      return;
    }
  } catch {}

  // -------- LYRICS.OVH --------
  try {
    const url = `https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(trackName)}`;
    const data = await fetchJSON(url);

    if (data?.lyrics) {
      setStatus('Lyrics loaded (lyrics.ovh)', 'lyrics.ovh');
      const lines = data.lyrics.split('\n').filter(l => l.trim());

      lyricsData = lines.map((t, i) => ({
        time: i * 2000,
        text: t
      }));

      renderLyrics(lyricsData);
      return;
    }
  } catch {}

  // -------- HARDCODED --------
  const hardcoded = getHardcodedLyrics(trackName);

  if (hardcoded) {
    setStatus('Lyrics loaded (local)', '');
    lyricsData = hardcoded;
    renderLyrics(lyricsData);
    scheduleBleeps();
    return;
  }

  setStatus('Lyrics not found', '');
}

// ============================
// BLEEP SCHEDULER (SYNCED ONLY)
// ============================
function scheduleBleeps() {
  scheduledBleeps = [];

  lyricsData.forEach(line => {
    const words = line.text.split(/\s+/);

    words.forEach((word, idx) => {
      if (isBadWord(word)) {
        const ratio = idx / Math.max(words.length, 1);
        const offset = ratio * 700;

        scheduledBleeps.push(line.time + offset);
      }
    });
  });
}

// ============================
// BLEEP ENGINE
// ============================
function checkBleepTriggers(posMs) {
  scheduledBleeps.forEach(time => {
    const diff = time - posMs;

    if (Math.abs(diff) < 120 && !firedBleeps.has(time)) {
      firedBleeps.add(time);

      triggerBleep();

      setTimeout(() => firedBleeps.delete(time), 1500);
    }
  });

  // Optional highlight sync hook
  highlightLyrics(posMs);
}

// ============================
// AUDIO BLEEP
// ============================
function triggerBleep() {
  if (!player && !spotifyPlayer) return;

  const p = spotifyPlayer || player;

  p.setVolume(0);

  setTimeout(() => {
    p.setVolume(userVolume || 1);
  }, 250);
}

// ============================
// LYRIC HIGHLIGHTING (HOOK)
// ============================
function highlightLyrics(posMs) {
  if (typeof updateHighlightedLine === 'function') {
    const index = lyricsData.findIndex((l, i) => {
      const next = lyricsData[i + 1];
      return posMs >= l.time && (!next || posMs < next.time);
    });

    if (index !== -1) {
      updateHighlightedLine(index);
    }
  }
}

// ============================
// UI HELPERS (NO-OP SAFE)
// ============================
function setStatus(text, source) {
  console.log(text, source);
}

function renderLyrics(data) {
  console.log("Lyrics loaded:", data.length);
}

// ============================
// EXPECTED TO BE CALLED BY PLAYER LOOP
// ============================
// checkBleepTriggers(currentPlaybackPositionMs)

</script>
