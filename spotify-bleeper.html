<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanBeat — Spotify Integrated</title>
<style>
body{background:#0a0a0a;color:#eee;font-family:Arial;padding:20px}
input,button{padding:10px;margin:5px}
#lyrics{margin-top:20px}
.bleep{color:#ffcc00}
</style>
</head>
<body>

<h2>CleanBeat — Full Spotify Version</h2>
<input id="clientId" placeholder="Spotify Client ID" />
<button onclick="connectSpotify()">Connect</button>

<br/>
<input id="searchInput" placeholder="Search song" />
<button onclick="searchTrack()">Play</button>

<div id="status"></div>
<div id="lyrics"></div>

<script>
// ================= STATE =================
let player, deviceId, token;
let lyricsData=[];
let scheduledBleeps=[];
let firedBleeps=new Set();
let interval;

// ================= UTIL =================
function setStatus(a,b){
 document.getElementById('status').innerText = b? a+" — "+b : a;
}

function normalizeTrackName(name){
 return name.toLowerCase()
  .replace(/\(.*?\)/g,'')
  .replace(/from.*$/g,'')
  .replace(/[^a-z0-9]/g,'');
}

// ================= BAD WORDS =================
const BAD_WORDS=['fuck','shit','bitch','ass','damn'];

function containsBadWord(text){
 return BAD_WORDS.some(w=> new RegExp(`\\b${w}\\w*\\b`,'i').test(text));
}

function censor(text){
 let out=text;
 BAD_WORDS.forEach(w=>{
  out = out.replace(new RegExp(`\\b${w}\\w*\\b`,'gi'),'<span class="bleep">[BLEEP]</span>');
 });
 return out;
}

// ================= AUTH =================
function connectSpotify(){
 const clientId=document.getElementById('clientId').value;
 const redirect=window.location.href;
 const scopes='streaming user-read-playback-state user-modify-playback-state';

 const url=`https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${encodeURIComponent(redirect)}&scope=${encodeURIComponent(scopes)}`;
 window.location=url;
}

function init(){
 const hash=window.location.hash;
 if(hash.includes('access_token')){
  token=new URLSearchParams(hash.substring(1)).get('access_token');
  window.history.replaceState({}, document.title, window.location.pathname);
  loadPlayer();
 }
}

function loadPlayer(){
 const script=document.createElement('script');
 script.src='https://sdk.scdn.co/spotify-player.js';
 document.body.appendChild(script);

 window.onSpotifyWebPlaybackSDKReady=()=>{
  player=new Spotify.Player({
   name:'CleanBeat',
   getOAuthToken:cb=>cb(token)
  });

  player.addListener('ready',({device_id})=>{
   deviceId=device_id;
   setStatus('Connected','Spotify ready');
  });

  player.addListener('player_state_changed',state=>{
   if(!state) return;
   const pos=state.position;
   checkBleeps(pos);
  });

  player.connect();
 };
}

// ================= SEARCH =================
async function searchTrack(){
 const q=document.getElementById('searchInput').value;
 const res=await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track&limit=1`,{
  headers:{Authorization:`Bearer ${token}`}
 });
 const data=await res.json();
 const track=data.tracks.items[0];

 await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`,
 {
  method:'PUT',
  headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
  body:JSON.stringify({uris:[track.uri]})
 });

 setStatus('Playing',track.name);

 await fetchLyrics(track.name,track.artists[0].name);
}

// ================= LYRICS =================
async function fetchLyrics(track,artist){
 let data = await tryLRCLIB(track,artist);
 if(!data) data = await tryOVH(track,artist);
 if(!data) data = getLocal(track);

 if(!data){ setStatus('Lyrics not found'); return; }

 lyricsData=data;
 renderLyrics();
 scheduleBleeps();
}

async function tryLRCLIB(track,artist){
 try{
  let res=await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(track+' '+artist)}`);
  let arr=await res.json();
  let m=arr.find(x=>x.syncedLyrics)||arr[0];
  if(!m) return null;

  if(m.syncedLyrics) return parseLRC(m.syncedLyrics);

  let lines=m.plainLyrics.split('\n').filter(l=>l.trim());
  return lines.map((t,i)=>({time:i*2000,text:t}));
 }catch(e){return null;}
}

async function tryOVH(track,artist){
 try{
  let res=await fetch(`https://api.lyrics.ovh/v1/${artist}/${track}`);
  let data=await res.json();
  if(!data.lyrics) return null;

  let lines=data.lyrics.split('\n').filter(l=>l.trim());
  return lines.map((t,i)=>({time:i*2000,text:t}));
 }catch(e){return null;}
}

function getLocal(track){
 let key=normalizeTrackName(track);
 let lib={
  'aariaari':[
   {time:0,text:'bitch you got an ego'},
   {time:5000,text:'fucking money like casino'}
  ]
 };
 let k=Object.keys(lib).find(x=>key.includes(x));
 return k?lib[k]:null;
}

function parseLRC(lrc){
 return lrc.split('\n').map(l=>{
  let m=l.match(/\[(\d+):(\d+).(\d+)\](.*)/);
  if(!m) return null;
  return {time:(+m[1]*60+ +m[2])*1000,text:m[4]};
 }).filter(Boolean);
}

// ================= UI =================
function renderLyrics(){
 document.getElementById('lyrics').innerHTML = lyricsData.map(l=>`<div>${censor(l.text)}</div>`).join('');
}

// ================= BLEEP =================
function scheduleBleeps(){
 scheduledBleeps = lyricsData.filter(l=>containsBadWord(l.text)).map(l=>l.time);
}

function checkBleeps(pos){
 scheduledBleeps.forEach(t=>{
  if(Math.abs(t-pos)<200 && !firedBleeps.has(t)){
   firedBleeps.add(t);
   triggerBleep();
   setTimeout(()=>firedBleeps.delete(t),3000);
  }
 });
}

function triggerBleep(){
 if(!player) return;
 player.setVolume(0);
 setStatus('BLEEP!');
 setTimeout(()=>player.setVolume(1),500);
}

// ================= INIT =================
init();

</script>
</body>
</html>
