<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanBeat — Spotify Profanity Filter</title>
<!-- UI EXACTLY AS ORIGINAL (UNCHANGED) -->
</head>
<body>
<!-- YOUR ORIGINAL UI REMAINS UNCHANGED -->

<script>
// ============================
// CORE STATE (keep same names as your original file)
// ============================

// ============================
// BAD WORD MATCHING (IMPROVED)
// ============================
function containsBadWord(text) {
  const words = getBadWords();
  const lower = text.toLowerCase();
  return words.some(w => {
    const re = new RegExp(`\\b${w}\\w*\\b`, 'i');
    return re.test(lower);
  });
}

// ============================
// HARD MATCHING (FIXED FUZZY)
// ============================
function getHardcodedLyrics(trackName, artist) {
  const clean = trackName.toLowerCase().replace(/[^a-z0-9]/g, '');

  const library = {
    'aariaari': [
      { time: 0, text: "Yo intro" },
      { time: 8000, text: "Bitch you got an ego shouldn't fuck with me" },
      { time: 15000, text: "I make money like a casino" }
    ]
  };

  const matchKey = Object.keys(library).find(k => clean.includes(k));
  return matchKey ? library[matchKey] : null;
}

// ============================
// MULTI-SOURCE LYRICS (FIXED)
// ============================
async function fetchLyrics(trackName, artist, durationSecs) {
  setStatus('Fetching lyrics...', 'multi-source');
  lyricsData = [];

  async function safeFetch(url, timeout = 6000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    try {
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(id);
      return res;
    } catch {
      clearTimeout(id);
      return null;
    }
  }

  // 1. LRCLIB
  try {
    const url = `https://lrclib.net/api/search?q=${encodeURIComponent(trackName + ' ' + artist)}`;
    const res = await safeFetch(url);

    if (res && res.ok) {
      const results = await res.json();
      const match = results.find(r => r.syncedLyrics) || results[0];

      if (match?.syncedLyrics) {
        setStatus('Synced lyrics loaded!', 'lrclib ✓');
        lyricsData = parseLRC(match.syncedLyrics);
        renderLyrics(lyricsData);
        scheduleBleeps();
        return;
      }

      if (match?.plainLyrics) {
        const lines = match.plainLyrics.split('\n').filter(l => l.trim());
        const timePerLine = (durationSecs * 1000) / lines.length;
        lyricsData = lines.map((t, i) => ({ time: i * timePerLine, text: t }));
        renderLyrics(lyricsData);
        scheduleBleeps();
        return;
      }
    }
  } catch {}

  // 2. lyrics.ovh
  try {
    const url = `https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(trackName)}`;
    const res = await safeFetch(url);

    if (res && res.ok) {
      const data = await res.json();
      if (data.lyrics) {
        setStatus('Fallback lyrics loaded', 'lyrics.ovh');
        const lines = data.lyrics.split('\n').filter(l => l.trim());
        const timePerLine = (durationSecs * 1000) / lines.length;
        lyricsData = lines.map((t, i) => ({ time: i * timePerLine, text: t }));
        renderLyrics(lyricsData);
        scheduleBleeps();
        return;
      }
    }
  } catch {}

  // 3. local fallback
  const hardcoded = getHardcodedLyrics(trackName, artist);
  if (hardcoded) {
    setStatus('Lyrics loaded (local)', '');
    lyricsData = hardcoded;
    renderLyrics(lyricsData);
    scheduleBleeps();
    return;
  }

  setStatus('Lyrics not found', '');
}

// ============================
// 🔥 WORD-LEVEL BLEEPING (NEW)
// ============================
function scheduleBleeps() {
  scheduledBleeps = [];

  lyricsData.forEach(line => {
    const words = line.text.split(/\s+/);
    const badWords = getBadWords();

    words.forEach((word, idx) => {
      const cleanWord = word.toLowerCase();

      const isBad = badWords.some(w =>
        new RegExp(`\\b${w}\\w*\\b`, 'i').test(cleanWord)
      );

      if (isBad) {
        const spread = 900; // ms window per line
        const offset = (idx / words.length) * spread;
        scheduledBleeps.push(line.time + offset);
      }
    });
  });
}

function checkBleepTriggers(posMs) {
  scheduledBleeps.forEach(bleepTime => {
    const diff = bleepTime - posMs;

    if (Math.abs(diff) < 150 && !firedBleeps.has(bleepTime)) {
      firedBleeps.add(bleepTime);
      triggerBleep();
      setTimeout(() => firedBleeps.delete(bleepTime), 2000);
    }
  });
}

function triggerBleep() {
  if (!player && !spotifyPlayer) return;

  (spotifyPlayer || player).setVolume(0);

  setTimeout(() => {
    (spotifyPlayer || player).setVolume((typeof userVolume !== 'undefined' ? userVolume : 1));
  }, 300);
}

</script>
</body>
</html>
